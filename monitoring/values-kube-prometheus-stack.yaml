# Helm values override for prometheus-community/kube-prometheus-stack
# Install: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#          helm install kube-prom prometheus-community/kube-prometheus-stack -n monitoring --create-namespace -f values-kube-prometheus-stack.yaml

grafana:
  enabled: true
  adminPassword: changeme
  service:
    type: LoadBalancer
  ingress:
    enabled: false

prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

defaultRules:
  create: true

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

alertmanager:
  enabled: true
