services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./app/backend
    environment:
      PORT: "3000"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: changeme
      CORS_ORIGIN: "*"
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./app/frontend
      args:
        # Browser calls API on host port 3000 (CORS enabled on backend).
        VITE_API_BASE_URL: "http://localhost:3000"
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata: {}
