{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "devops-demo.fullname" . }}
  labels:
    {{- include "devops-demo.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path | quote }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ if eq .service "frontend" }}{{ include "devops-demo.frontend.fullname" $ }}{{ else }}{{ include "devops-demo.backend.fullname" $ }}{{ end }}
                port:
                  number: {{ if eq .service "frontend" }}{{ $.Values.service.frontend.port }}{{ else }}{{ $.Values.service.backend.port }}{{ end }}
          {{- end }}
    {{- end }}
{{- end }}
